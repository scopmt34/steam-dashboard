<title>Steam 実績ダッシュボード</title>
<style>
:root {
  --bg: #f2f4f7; --surface: #ffffff; --surface-2: #eef1f5;
  --ink: #17212e; --muted: #63707f; --line: #dbe1e8;
  --gold: #d99413; --gold-soft: #f5b73d; --blue: #2f7fd1; --track: #e2e7ee;
  --shadow: 0 1px 2px rgba(20,30,45,.06), 0 4px 16px rgba(20,30,45,.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e1620; --surface: #17212e; --surface-2: #1d2a39;
    --ink: #e8eef4; --muted: #8695a5; --line: #263443;
    --gold: #f5b73d; --gold-soft: #ffcf6b; --blue: #4d9de0; --track: #223142;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.28);
  }
}
:root[data-theme="light"] {
  --bg: #f2f4f7; --surface: #ffffff; --surface-2: #eef1f5;
  --ink: #17212e; --muted: #63707f; --line: #dbe1e8;
  --gold: #d99413; --gold-soft: #f5b73d; --blue: #2f7fd1; --track: #e2e7ee;
  --shadow: 0 1px 2px rgba(20,30,45,.06), 0 4px 16px rgba(20,30,45,.05);
}
:root[data-theme="dark"] {
  --bg: #0e1620; --surface: #17212e; --surface-2: #1d2a39;
  --ink: #e8eef4; --muted: #8695a5; --line: #263443;
  --gold: #f5b73d; --gold-soft: #ffcf6b; --blue: #4d9de0; --track: #223142;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.28);
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  line-height: 1.5; -webkit-font-smoothing: antialiased;
}
.mono { font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
  font-variant-numeric: tabular-nums; }
.wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 64px; }

header.top { margin-bottom: 28px; }
.eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--gold); font-weight: 700; margin: 0 0 6px; }
h1 { margin: 0; font-size: clamp(26px, 4vw, 38px); font-weight: 800;
  letter-spacing: -.02em; text-wrap: balance; }
.gen { color: var(--muted); font-size: 13px; margin-top: 8px; }

.tiles { display: grid; gap: 14px; margin: 24px 0 8px;
  grid-template-columns: repeat(4, 1fr); }
@media (max-width: 640px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
.tile { background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px 18px; box-shadow: var(--shadow); }
.tile .k { font-size: 12px; color: var(--muted); letter-spacing: .04em;
  text-transform: uppercase; font-weight: 600; }
.tile .v { font-size: 28px; font-weight: 800; margin-top: 6px; letter-spacing: -.01em; }
.tile .v small { font-size: 15px; color: var(--muted); font-weight: 600; }

.controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  margin: 22px 0 14px; position: sticky; top: 0; z-index: 5;
  background: var(--bg); padding: 10px 0; }
.seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 10px; padding: 3px; gap: 2px; }
.seg button { border: 0; background: transparent; color: var(--muted);
  font: inherit; font-size: 13px; font-weight: 600; padding: 6px 12px;
  border-radius: 7px; cursor: pointer; }
.seg button[aria-pressed="true"] { background: var(--surface); color: var(--ink);
  box-shadow: 0 1px 3px rgba(0,0,0,.12); }
.seg button:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; }
.spacer { flex: 1 1 auto; }
label.sortl { font-size: 13px; color: var(--muted); font-weight: 600; }
select { font: inherit; font-size: 13px; font-weight: 600; color: var(--ink);
  background: var(--surface); border: 1px solid var(--line); border-radius: 9px;
  padding: 7px 10px; cursor: pointer; }
.dirbtn { display: inline-flex; align-items: center; gap: 5px; font: inherit;
  font-size: 13px; font-weight: 600; color: var(--ink); background: var(--surface);
  border: 1px solid var(--line); border-radius: 9px; padding: 7px 11px; cursor: pointer; }
.dirbtn:hover { background: var(--surface-2); }
.dirbtn:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; }
.dirbtn .ico { font-size: 14px; line-height: 1; }

.list { display: flex; flex-direction: column; gap: 8px; }
.game { background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden; }
.row { display: grid; align-items: center; gap: 14px;
  grid-template-columns: 1fr 200px 72px 84px 28px; padding: 13px 16px; cursor: pointer;
  width: 100%; border: 0; background: transparent; color: inherit; font: inherit;
  text-align: left; }
body[data-public="1"] .row { grid-template-columns: 1fr 200px 72px 28px; }
.row:hover { background: var(--surface-2); }
.row:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }
.gname { display: flex; align-items: center; gap: 10px; min-width: 0; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.dot.done { background: var(--gold); box-shadow: 0 0 0 3px color-mix(in srgb, var(--gold) 22%, transparent); }
.dot.prog { background: var(--blue); }
.dot.none { background: var(--muted); opacity: .5; }
.gname .t { font-weight: 650; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; }
.badge { font-size: 10.5px; font-weight: 700; letter-spacing: .03em; flex: none;
  padding: 2px 7px; border-radius: 6px; text-transform: uppercase; }
.badge.done { color: var(--gold); background: color-mix(in srgb, var(--gold) 16%, transparent); }

.prog-wrap { display: flex; align-items: center; gap: 10px; }
.bar { flex: 1; height: 8px; background: var(--track); border-radius: 999px; overflow: hidden; }
.bar > i { display: block; height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--gold), var(--gold-soft)); }
.game.isprog .bar > i { background: linear-gradient(90deg, var(--blue), color-mix(in srgb, var(--blue) 55%, white)); }
.pct { font-size: 13px; font-weight: 700; width: 44px; text-align: right; }
.count { font-size: 13px; color: var(--muted); text-align: right; }
.pt { font-size: 13px; text-align: right; }
.pt .u { color: var(--muted); font-size: 11px; }
.chev { color: var(--muted); justify-self: center; transition: transform .18s; }
.game[open-state="1"] .chev { transform: rotate(90deg); }

.detail { border-top: 1px solid var(--line); padding: 4px 16px 16px; display: none; }
.game[open-state="1"] .detail { display: block; }
.ach-grid { display: grid; gap: 6px 18px; margin-top: 10px;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.ach { display: flex; align-items: baseline; gap: 8px; font-size: 13px;
  padding: 3px 0; border-bottom: 1px dashed color-mix(in srgb, var(--line) 70%, transparent); }
.ach .mk { flex: none; width: 14px; text-align: center; font-weight: 800; }
.ach.u .mk { color: var(--gold); }
.ach.l .mk { color: var(--muted); opacity: .5; }
.ach .an { flex: 1; min-width: 0; }
.ach.l .an { color: var(--muted); }
.ach .ad { color: var(--muted); font-size: 11.5px; white-space: nowrap; }
.empty { color: var(--muted); text-align: center; padding: 40px; }

@media (max-width: 720px) {
  .row { grid-template-columns: 1fr 120px 26px !important; }
  .count, .pt.col { display: none; }
  .prog-wrap .pct { display: none; }
}
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

<div class="wrap">
  <header class="top">
    <p class="eyebrow">Steam Achievements</p>
    <h1>実績ダッシュボード</h1>
    <p class="gen">最終更新 <span id="gen" class="mono"></span> ・ ローカルキャッシュから生成</p>
    <div class="tiles" id="tiles"></div>
  </header>

  <div class="controls">
    <div class="seg" id="filter" role="group" aria-label="フィルタ">
      <button data-f="all" aria-pressed="true">すべて</button>
      <button data-f="done">コンプ</button>
      <button data-f="prog">進行中</button>
      <button data-f="none">未着手</button>
    </div>
    <div class="spacer"></div>
    <label class="sortl" for="sort">並び替え</label>
    <select id="sort">
      <option value="pct">達成率</option>
      <option value="playtime">プレイ時間</option>
      <option value="remaining">残り実績数</option>
      <option value="name">名前</option>
    </select>
    <button id="dir" class="dirbtn" aria-label="昇順と降順を切り替え">
      <span class="ico" id="dirico" aria-hidden="true">&#8595;</span><span id="dirtxt">降順</span>
    </button>
  </div>

  <div class="list" id="list"></div>
</div>

const cmps = {
  pct: (a,b) => (a.done/a.total) - (b.done/b.total),
  playtime: (a,b) => (a.playtime_min||0) - (b.playtime_min||0),
  remaining: (a,b) => (a.total-a.done) - (b.total-b.done),
  name: (a,b) => a.name.localeCompare(b.name, 'ja'),
};
function sortGames(arr) {
  const s = [...arr].sort(cmps[sort]);
  return dir === 'desc' ? s.reverse() : s;
}

function render() {
  const list = document.getElementById('list');
  let arr = games.filter(g => filter === 'all' ? true : stateOf(g) === filter);
  arr = sortGames(arr);
  if (!arr.length) { list.innerHTML = '<div class="empty">該当するゲームがありません</div>'; return; }
  list.innerHTML = arr.map(g => {
    const st = stateOf(g);
    const pct = Math.round(g.done / g.total * 100);
    const cls = st === 'done' ? 'isdone' : st === 'prog' ? 'isprog' : 'isnone';
    const badge = st === 'done' ? '<span class="badge done">100%</span>' : '';
    const ptCol = PUBLIC ? '' : `<div class="pt mono col">${fmtPT(g.playtime_min)}</div>`;
    return `<div class="game ${cls}" data-appid="${g.appid}">
      <button class="row" aria-expanded="false">
        <div class="gname"><span class="dot ${st}"></span>
          <span class="t">${esc(g.name)}</span>${badge}</div>
        <div class="prog-wrap">
          <span class="bar"><i style="width:${pct}%"></i></span>
          <span class="pct mono">${pct}%</span>
        </div>
        <div class="count mono col">${g.done}/${g.total}</div>
        ${ptCol}
        <svg class="chev" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="detail"></div>
    </div>`;
  }).join('');
}

function renderDetail(g) {
  const ach = [...g.ach].sort((a,b) => (b.u?1:0)-(a.u?1:0) || (b.t||0)-(a.t||0));
  return `<div class="ach-grid">` + ach.map(a =>
    `<div class="ach ${a.u ? 'u' : 'l'}">
      <span class="mk">${a.u ? '★' : '·'}</span>
      <span class="an">${esc(a.n || '(名称なし)')}</span>
      <span class="ad mono">${a.u ? fmtDate(a.t) : ''}</span>
    </div>`).join('') + `</div>`;
}

document.getElementById('list').addEventListener('click', (e) => {
  const btn = e.target.closest('.row'); if (!btn) return;
  const game = btn.closest('.game');
  const open = game.getAttribute('open-state') === '1';
  if (open) { game.removeAttribute('open-state'); btn.setAttribute('aria-expanded','false'); return; }
  const g = games.find(x => x.appid === game.dataset.appid);
  const detail = game.querySelector('.detail');
  if (!detail.dataset.filled) { detail.innerHTML = renderDetail(g); detail.dataset.filled = '1'; }
  game.setAttribute('open-state','1'); btn.setAttribute('aria-expanded','true');
});

document.getElementById('filter').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  filter = b.dataset.f;
  [...e.currentTarget.children].forEach(x => x.setAttribute('aria-pressed', x === b));
  render();
});
document.getElementById('sort').addEventListener('change', (e) => { sort = e.target.value; render(); });
document.getElementById('dir').addEventListener('click', () => {
  dir = dir === 'desc' ? 'asc' : 'desc';
  document.getElementById('dirico').innerHTML = dir === 'desc' ? '&#8595;' : '&#8593;';
  document.getElementById('dirtxt').textContent = dir === 'desc' ? '降順' : '昇順';
  render();
});

// 公開版はプレイ時間を出さないので、その並び替えオプションも消す
if (PUBLIC) {
  const o = document.querySelector('#sort option[value="playtime"]');
  if (o) o.remove();
}

render();
</script>
